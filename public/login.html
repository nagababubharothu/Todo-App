<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginSection">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()" class="primary">Login</button>

    <a href="signup.html">Signup</a>
</div>

<!-- DASHBOARD -->
<div id="todoSection" style="display:none;">
    <h2>Your Todo List</h2>

    <!-- ADD TASK -->
    <input id="taskInput" placeholder="Enter new task">
    <button onclick="addTask()">Add Task</button>

    <hr>

    <!-- SCRAPING -->
    <h3>Scrape Website</h3>
    <input id="urlInput" placeholder="Enter URL (https://...)">
    <button onclick="scrapeTask()">Scrape & Add</button>

    <hr>

    <!-- TASK LIST -->
    <ul id="todoList"></ul>

    <hr>

    <!-- PAYMENT -->
    <h3>Payment</h3>
    <button onclick="goToPayment()">Go to Payment</button>

    <br><br>
    <button onclick="logout()" class="logout">Logout</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
