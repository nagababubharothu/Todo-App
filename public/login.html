<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div id="loginSection">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()" class="primary">Login</button>

    <a href="signup.html">Signup</a>
</div>

<div id="todoSection" style="display:none;">
    <h2>Todo Dashboard</h2>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <input id="urlInput" placeholder="Enter URL for scraping">
    <button onclick="scrapeTask()">Scrape</button>

    <button onclick="goToPayment()">Go to Payment</button>

    <ul id="todoList"></ul>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
