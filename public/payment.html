<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
<h2>Dummy Payment Gateway 💳</h2>

<p>Amount: ₹100</p>

<button onclick="success()" class="primary">Pay Successfully</button>

<script>

}

function fail() {
    alert("Payment Failed ❌");
}
</script>
