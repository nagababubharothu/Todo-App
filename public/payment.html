<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
<h2>Dummy Payment Gateway 💳</h2>

<p id="amountText"></p>

<button onclick="success()" class="primary">Pay Successfully</button>
<button onclick="fail()" class="delete">Fail Payment</button>
</div>

<script>
let amount = localStorage.getItem("amount") || 100;
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let details = "";

// SHOW PRODUCTS
cart.forEach(item => {
    details += item.product + " ₹" + item.price + "\n";
});

document.getElementById("amountText").innerText =
    details + "\nTotal: ₹" + amount;

// PAYMENT SUCCESS
async function success() {

    await fetch("/api/payment/pay", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": localStorage.getItem("token")
        },
        body: JSON.stringify({
            amount: amount,
            cart: cart
        })
    });

    alert("Payment successful ₹" + amount);
    localStorage.removeItem("cart");

    window.location.href = "/";
}

// PAYMENT FAIL
function fail() {
    alert("Payment Failed ❌");
}
</script>

</body>
</html>
