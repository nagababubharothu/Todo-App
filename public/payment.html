<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Dummy Payment Gateway 💳</h2>

    <p>Amount: ₹{{ amount }}</p>

    <button onclick="success()">Pay Successfully</button>
    <button onclick="fail()">Fail Payment</button>
</div>

<script>
function success() {
    window.location.href = "/payment-success";
}

function fail() {
    alert("Payment Failed ❌");
}
</script>

</body>
</html>
